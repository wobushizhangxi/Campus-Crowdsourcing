spring.application.name=campus-backend
spring.config.import=optional:classpath:application-local.properties,optional:file:./config/application-local.properties
server.port=8080

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:campus_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:MySQL666}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=false
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.jackson.time-zone=Asia/Shanghai

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:change-me-in-production-jwt-secret-2026}
app.security.jwt.expiration-minutes=${APP_SECURITY_JWT_EXPIRATION_MINUTES:720}
app.security.admin.username=${APP_SECURITY_ADMIN_USERNAME:}
app.security.admin.password=${APP_SECURITY_ADMIN_PASSWORD:}
app.security.admin.name=${APP_SECURITY_ADMIN_NAME:\u5E73\u53F0\u7BA1\u7406\u5458}

app.open-browser=${APP_OPEN_BROWSER:false}
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
