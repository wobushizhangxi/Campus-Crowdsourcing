spring.datasource.url=jdbc:h2:file:${user.home}/AppData/Local/CampusCrowdPlatform/data/campus;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

app.security.admin.username=${APP_SECURITY_ADMIN_USERNAME:admin001}
app.security.admin.password=${APP_SECURITY_ADMIN_PASSWORD:Admin123!}
app.security.admin.name=${APP_SECURITY_ADMIN_NAME:\u5E73\u53F0\u7BA1\u7406\u5458}
app.open-browser=${APP_OPEN_BROWSER:true}
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
